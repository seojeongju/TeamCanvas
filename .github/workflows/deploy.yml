name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-teamcanvas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix apps/web

      - name: Build
        run: npm run build

      - name: Verify Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is missing."
            echo "::error::GitHub → Settings → Secrets → Actions 에서 토큰을 등록하세요."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is missing."
            echo "::error::값: 85c8e953bdefb825af5374f0d66ca5dc"
            exit 1
          fi
          echo "Checking Cloudflare API token..."
          npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/web/dist --project-name=teamcanvas --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations (remote)
        id: migrate
        continue-on-error: true
        run: npx wrangler d1 migrations apply teamcanvas-db --remote -c wrangler.d1.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Note migration failure
        if: steps.migrate.outcome == 'failure'
        run: |
          echo "::warning::D1 migration failed. 앱은 배포되었으나 DB 스키마(0009 초대 링크)가 미적용일 수 있습니다."
          echo "::warning::CLOUDFLARE_API_TOKEN에 D1 Edit 권한이 있는지 확인 후 워크플로를 재실행하세요."
