name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-teamcanvas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix apps/web

      - name: Build
        run: npm run build

      - name: Apply D1 migrations (remote)
        id: migrate
        continue-on-error: true
        run: |
          set -o pipefail
          npx wrangler d1 migrations apply teamcanvas-db --remote -c wrangler.d1.jsonc 2>&1 | tee migration.log
          echo "--- migration log ---"
          cat migration.log
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Note migration failure
        if: steps.migrate.outcome == 'failure'
        run: |
          echo "::warning::D1 migration failed. Pages deploy will continue."
          echo "::warning::Re-issue CLOUDFLARE_API_TOKEN with D1 Edit (+ Workers AI Edit) and re-run migrations."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=teamcanvas --branch=main
