name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix apps/web

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: D1 migrate (local, E2E)
        run: npx wrangler d1 migrations apply teamcanvas-db --local -c wrangler.d1.jsonc

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e
        env:
          ALLOW_DEV_AUTH: "true"
